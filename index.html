<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual TV - Live Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        @media (min-width: 768px) { .app-container { flex-direction: row; } }

        /* AREA DO VÍDEO */
        .video-viewport { flex: 1; position: relative; background: #000; overflow: hidden; }
        
        #youtube-player {
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%;
            pointer-events: none;
        }

        .custom-player-ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 50%);
            transition: opacity 0.3s;
        }

        /* CONTROLES */
        .live-progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.2); margin-bottom: 12px; }
        .live-progress-bar { height: 100%; background: #ff0000; width: 100%; }

        .control-btn { 
            display: flex; align-items: center; justify-content: center;
            padding: 8px; border-radius: 4px; transition: 0.2s; cursor: pointer;
        }
        .control-btn:hover { background: rgba(255,255,255,0.1); }
        .control-btn i { width: 20px; height: 20px; }

        /* SIDEBAR */
        .sidebar { background: #0a0a0a; border-right: 1px solid #1a1a1a; overflow-y: auto; }
        @media (min-width: 768px) { .sidebar { width: 320px; height: 100vh; } }
        @media (max-width: 767px) { .sidebar { width: 100%; height: 35vh; order: 2; } }

        .ch-item { padding: 15px 20px; border-bottom: 1px solid #111; cursor: pointer; }
        .ch-item.active { background: #111; border-left: 4px solid #00adef; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="p-6 border-b border-zinc-800">
                <h1 class="font-black italic text-xl text-[#00adef]">MANUAL <span class="text-white">TV</span></h1>
            </div>
            <div id="channel-list"></div>
        </aside>

        <main class="video-viewport" id="main-player">
            <div id="youtube-player"></div>

            <div class="custom-player-ui p-6" id="player-overlay">
                <div class="mb-4">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="bg-red-600 px-1.5 py-0.5 text-[9px] font-bold uppercase rounded-sm">Ao Vivo</span>
                        <span id="current-time" class="text-zinc-400 text-[11px] font-mono">14:00:00</span>
                    </div>
                    <h2 id="v-title" class="text-2xl md:text-4xl font-black uppercase italic tracking-tighter">Sincronizando...</h2>
                </div>

                <div class="live-progress-container">
                    <div class="live-progress-bar"></div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="control-btn" onclick="toggleMute()" title="Mutar/Desmutar">
                            <i data-lucide="volume-2" id="icon-mute"></i>
                        </div>
                        <div class="control-btn" onclick="toggleCC()" title="Legendas">
                            <i data-lucide="captions"></i>
                        </div>
                        <div class="control-btn" onclick="alert('Qualidade Automática (HD)')" title="Qualidade">
                            <i data-lucide="settings-2"></i>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <div class="control-btn" onclick="toggleFav()" title="Favoritos">
                            <i data-lucide="star" id="icon-fav"></i>
                        </div>
                        <div class="control-btn" onclick="shareVideo()" title="Compartilhar">
                            <i data-lucide="share-2"></i>
                        </div>
                        <div class="control-btn" onclick="toggleFullscreen()" title="Tela Cheia">
                            <i data-lucide="maximize"></i>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const VIDEOS = [
            {id: "KmqG_S8I6Yk", dur: 660, t: "Fábrica de Vidro"},
            {id: "m_S4qWfH6E4", dur: 780, t: "Avião de Papel Gigante"},
            {id: "V8G_uV_0Dms", dur: 900, t: "Nitrogênio Líquido"},
            {id: "v9p_8n_Mv_o", dur: 600, t: "Lupa de Água"}
        ];

        let player;
        let isMuted = true;
        let isCC = false;
        let isFav = false;

        function onYouTubeIframeAPIReady() {
            lucide.createIcons();
            renderList();
            initLive();
            setInterval(updateClock, 1000);
        }

        function initLive() {
            const video = VIDEOS[Math.floor(Math.random() * VIDEOS.length)];
            const start = Math.floor(Date.now() / 1000) % video.dur;
            document.getElementById('v-title').innerText = video.t;

            if (!player) {
                player = new YT.Player('youtube-player', {
                    videoId: video.id,
                    playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'start': start, 'rel': 0 },
                    events: {
                        'onReady': (e) => { e.target.mute(); e.target.playVideo(); },
                        'onStateChange': (e) => { if(e.data === 0) initLive(); }
                    }
                });
            } else {
                player.loadVideoById({ videoId: video.id, startSeconds: start });
            }
        }

        // FUNÇÕES DOS BOTÕES
        function toggleMute() {
            isMuted = !isMuted;
            const icon = document.getElementById('icon-mute');
            if (isMuted) {
                player.mute();
                icon.setAttribute('data-lucide', 'volume-x');
            } else {
                player.unMute();
                icon.setAttribute('data-lucide', 'volume-2');
            }
            lucide.createIcons();
        }

        function toggleCC() {
            isCC = !isCC;
            if (isCC) player.loadModule("captions");
            else player.unloadModule("captions");
            alert(isCC ? "Legendas Ativadas" : "Legendas Desativadas");
        }

        function toggleFav() {
            isFav = !isFav;
            const icon = document.getElementById('icon-fav');
            icon.style.fill = isFav ? "#facc15" : "none";
            icon.style.color = isFav ? "#facc15" : "currentColor";
        }

        function shareVideo() {
            const url = `https://youtu.be/${player.getVideoData().video_id}`;
            navigator.clipboard.writeText(url);
            alert("Link do vídeo copiado!");
        }

        function toggleFullscreen() {
            const el = document.getElementById('main-player');
            if (!document.fullscreenElement) el.requestFullscreen();
            else document.exitFullscreen();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString();
        }

        function renderList() {
            const list = document.getElementById('channel-list');
            list.innerHTML = `<div class="ch-item active"><p class="text-[10px] text-zinc-500 font-bold uppercase">Canal 01</p><p class="font-bold">MANUAL DO MUNDO</p></div>`;
        }
    </script>
</body>
</html>
