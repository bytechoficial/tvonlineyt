<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Pro - Stream Direto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        @media (min-width: 768px) { .app-container { flex-direction: row; } }

        .video-viewport { flex: 1; position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #main-video { width: 100%; height: 100%; object-fit: contain; }

        .custom-ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 30%, rgba(0,0,0,0) 70%);
            padding: 2rem;
            pointer-events: none;
        }

        .ui-elements { pointer-events: auto; }

        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.2); margin-bottom: 15px; border-radius: 2px; overflow: hidden; }
        .progress-bar { height: 100%; background: #e11d48; width: 0%; transition: width 0.1s linear; }

        .control-btn { 
            display: flex; align-items: center; justify-content: center;
            padding: 10px; border-radius: 6px; transition: 0.2s; cursor: pointer;
        }
        .control-btn:hover { background: rgba(255,255,255,0.15); }
        .control-btn i { width: 22px; height: 22px; stroke-width: 2.5px; }

        .sidebar { background: #0a0a0a; border-right: 1px solid #1a1a1a; overflow-y: auto; }
        @media (min-width: 768px) { .sidebar { width: 320px; height: 100vh; } }
        @media (max-width: 767px) { .sidebar { width: 100%; height: 35vh; order: 2; } }

        .ch-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; }
        .ch-item.active { background: #111; border-left: 4px solid #e11d48; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="p-6 border-b border-zinc-800">
                <h1 class="font-black italic text-xl text-rose-600 tracking-tighter uppercase">Cine <span class="text-white">Live</span></h1>
            </div>
            <div id="channel-list"></div>
        </aside>

        <main class="video-viewport" id="player-container">
            <video id="main-video" playsinline autoplay muted loop>
                <source src="https://cdn.pixabay.com/video/2026/01/28/330898_large.mp4" type="video/mp4">
            </video>

            <div class="custom-ui">
                <div class="ui-elements">
                    <div class="mb-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="bg-rose-600 px-2 py-0.5 text-[10px] font-bold uppercase rounded-sm">Transmissão Direta</span>
                            <span id="video-time-display" class="text-zinc-400 text-xs font-medium">00:00 / 00:00</span>
                        </div>
                        <h2 id="v-title" class="text-3xl md:text-5xl font-black uppercase italic tracking-tighter">Natureza Cinematográfica</h2>
                    </div>

                    <div class="progress-container">
                        <div id="pb-fill" class="progress-bar"></div>
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="control-btn" onclick="toggleMute()">
                                <i data-lucide="volume-x" id="vol-icon"></i>
                            </div>
                            <div class="control-btn" onclick="alert('Legendas: Indisponíveis para este arquivo')">
                                <i data-lucide="captions"></i>
                            </div>
                            <div class="control-btn" onclick="alert('Qualidade: Original (Pixabay CDN)')">
                                <i data-lucide="layers"></i>
                            </div>
                        </div>

                        <div class="flex items-center gap-4">
                            <div class="control-btn" onclick="toggleFav()">
                                <i data-lucide="plus-circle" id="fav-icon"></i>
                            </div>
                            <div class="control-btn" onclick="copyLink()">
                                <i data-lucide="share-2"></i>
                            </div>
                            <div class="control-btn" onclick="toggleFS()">
                                <i data-lucide="maximize"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const video = document.getElementById('main-video');
        const pbFill = document.getElementById('pb-fill');

        window.onload = () => {
            lucide.createIcons();
            renderList();

            video.ontimeupdate = () => {
                const pct = (video.currentTime / video.duration) * 100;
                pbFill.style.width = pct + "%";
                
                const cur = formatTime(video.currentTime);
                const dur = formatTime(video.duration || 0);
                document.getElementById('video-time-display').innerText = `${cur} / ${dur}`;
            };
        };

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function toggleMute() {
            video.muted = !video.muted;
            const icon = document.getElementById('vol-icon');
            icon.setAttribute('data-lucide', video.muted ? 'volume-x' : 'volume-2');
            lucide.createIcons();
        }

        function toggleFav() {
            const icon = document.getElementById('fav-icon');
            icon.style.color = icon.style.color === 'rgb(225, 29, 72)' ? 'white' : '#e11d48';
        }

        function copyLink() {
            navigator.clipboard.writeText(video.querySelector('source').src);
            alert("Link do vídeo copiado!");
        }

        function toggleFS() {
            const container = document.getElementById('player-container');
            if (!document.fullscreenElement) container.requestFullscreen();
            else document.exitFullscreen();
        }

        function renderList() {
            const list = document.getElementById('channel-list');
            list.innerHTML = `
                <div class="ch-item active">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase mb-1">Destaque</p>
                    <p class="font-bold uppercase tracking-tight">Natureza Cinematográfica</p>
                </div>
            `;
        }
    </script>
</body>
</html>
