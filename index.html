<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web TV Pro - Adaptive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; overflow-x: hidden; margin: 0; }
        
        /* LAYOUT DINÂMICO */
        .app-container {
            display: flex;
            flex-direction: column; /* Padrão Mobile: Um abaixo do outro */
            height: 100vh;
        }

        @media (min-width: 768px) {
            .app-container {
                flex-direction: row; /* Desktop: Lado a lado */
            }
        }

        /* ÁREA DO PLAYER */
        .video-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Proporção 16:9 */
            overflow: hidden;
        }

        #youtube-player {
            position: absolute;
            top: -2%; left: -2%; width: 104%; height: 104%;
            pointer-events: none;
        }

        .glass-shield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20; background: transparent;
        }

        /* BARRA LATERAL (DESKTOP) / LISTA ABAIXO (MOBILE) */
        .sidebar {
            background: #0a0a0a;
            overflow-y: auto;
            border-right: 1px solid #1a1a1a;
        }

        @media (min-width: 768px) {
            .sidebar { width: 320px; height: 100vh; }
        }

        @media (max-width: 767px) {
            .sidebar { width: 100%; flex: 1; }
        }

        .channel-card {
            padding: 15px 20px;
            border-bottom: 1px solid #111;
            cursor: pointer;
            transition: 0.2s;
        }

        .channel-card.active {
            background: #111;
            border-left: 4px solid #facc15;
        }

        /* Elementos Visuais */
        .live-bar { height: 3px; background: #ff0000; width: 100%; }
        .logo-tv { font-weight: 900; font-style: italic; color: #facc15; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar order-2 md:order-1">
            <div class="p-5 border-b border-zinc-800 flex justify-between items-center bg-black">
                <span class="logo-tv text-xl">WEB TV</span>
                <button onclick="toggleAudio()" id="btn-audio" class="text-[10px] bg-white text-black px-3 py-1 rounded font-bold uppercase">Som</button>
            </div>
            <div id="channel-list">
                </div>
        </aside>

        <main class="video-section order-1 md:order-2">
            <div class="video-wrapper">
                <div id="youtube-player"></div>
                <div class="glass-shield"></div>
            </div>
            
            <div class="live-bar"></div>

            <div class="p-6 bg-zinc-900 shadow-xl">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
                    <span class="text-red-600 text-[10px] font-bold uppercase tracking-widest">Live Streaming</span>
                </div>
                <h2 id="video-title" class="text-xl md:text-3xl font-black italic uppercase tracking-tighter">Sincronizando...</h2>
                <p id="cat-name" class="text-zinc-500 text-xs font-bold mt-1"></p>
            </div>
        </main>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const CHANNELS = [
            {
                name: "Cine Action",
                videos: [
                    {id: "dQw4w9WgXcQ", dur: 212, t: "Operação Impacto"},
                    {id: "3tmd-ClpJKA", dur: 180, t: "Fuga Alucinante"}
                ]
            },
            {
                name: "Nature & Life",
                videos: [
                    {id: "v_S_Xn1hY8w", dur: 500, t: "Oceanos Desconhecidos"},
                    {id: "7664478", dur: 3600, t: "Planeta Terra"}
                ]
            }
        ];

        let player;
        let activeIdx = 0;

        function onYouTubeIframeAPIReady() {
            renderList();
            startTV();
        }

        function startTV() {
            const cat = CHANNELS[activeIdx];
            const video = cat.videos[Math.floor(Math.random() * cat.videos.length)];
            const startSecs = Math.floor(Date.now() / 1000) % video.dur;

            document.getElementById('video-title').innerText = video.t;
            document.getElementById('cat-name').innerText = cat.name;

            if (!player) {
                player = new YT.Player('youtube-player', {
                    videoId: video.id,
                    playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0, 'start': startSecs },
                    events: {
                        'onReady': (e) => { e.target.mute(); e.target.playVideo(); },
                        'onStateChange': (e) => { if(e.data === 0) startTV(); }
                    }
                });
            } else {
                player.loadVideoById({ videoId: video.id, startSeconds: startSecs });
            }
        }

        function toggleAudio() {
            if(player.isMuted()) {
                player.unMute();
                document.getElementById('btn-audio').innerText = "Mudo";
                document.getElementById('btn-audio').classList.replace('bg-white', 'bg-yellow-500');
            } else {
                player.mute();
                document.getElementById('btn-audio').innerText = "Som";
                document.getElementById('btn-audio').classList.replace('bg-yellow-500', 'bg-white');
            }
        }

        function changeCh(i) {
            activeIdx = i;
            startTV();
            renderList();
        }

        function renderList() {
            const list = document.getElementById('channel-list');
            list.innerHTML = CHANNELS.map((c, i) => `
                <div onclick="changeCh(${i})" class="channel-card ${activeIdx === i ? 'active' : ''}">
                    <p class="text-[9px] text-zinc-500 font-bold mb-1 italic">CHANNEL 0${i+1}</p>
                    <p class="font-black text-sm uppercase tracking-tight">${c.name}</p>
                    <div class="flex items-center gap-1 mt-2">
                        <div class="w-1 h-1 bg-red-500 rounded-full"></div>
                        <p class="text-[9px] text-red-500 font-bold uppercase">On Air</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
