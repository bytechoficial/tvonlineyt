<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual TV - 24h</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; margin: 0; overflow: hidden; font-family: sans-serif; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        @media (min-width: 768px) { .app-container { flex-direction: row; } }

        /* PLAYER COM ZOOM PARA ESCONDER YOUTUBE */
        .video-section { flex: 1; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .video-viewport { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; pointer-events: none; }
        #youtube-player { width: 100%; height: 100%; }
        .glass-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; background: transparent; }

        /* SIDEBAR */
        .sidebar { background: #0a0a0a; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        @media (min-width: 768px) { .sidebar { width: 320px; height: 100vh; } }
        @media (max-width: 767px) { .sidebar { width: 100%; order: 2; height: 40vh; } }

        .brand { padding: 20px; background: #000; border-bottom: 2px solid #00adef; }
        .channel-card { padding: 15px 20px; border-bottom: 1px solid #111; cursor: pointer; transition: 0.2s; }
        .channel-card.active { background: #111; border-left: 4px solid #00adef; }
        
        .live-bar { height: 3px; background: #ff0000; width: 100%; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="brand flex justify-between items-center">
                <h1 class="text-xl font-black italic text-[#00adef]">MANUAL <span class="text-white">TV</span></h1>
                <button onclick="toggleAudio()" id="btn-audio" class="bg-blue-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase">Som</button>
            </div>
            <div id="channel-list" class="overflow-y-auto flex-1"></div>
        </aside>

        <main class="video-section">
            <div class="video-viewport">
                <div id="youtube-player"></div>
            </div>
            <div class="glass-shield"></div>
            
            <div class="absolute bottom-0 left-0 w-full">
                <div class="live-bar"></div>
                <div class="p-6 bg-black/80 backdrop-blur-md border-t border-zinc-800">
                    <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-1">● No Ar Agora</p>
                    <h2 id="video-title" class="text-2xl font-black uppercase italic tracking-tighter italic">Sincronizando...</h2>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const CHANNELS = [
            {
                name: "Manual do Mundo",
                videos: [
                    {id: "KmqG_S8I6Yk", dur: 660, t: "Como é feito o vidro"},
                    {id: "m_S4qWfH6E4", dur: 780, t: "O maior avião de papel"},
                    {id: "V8G_uV_0Dms", dur: 900, t: "Experiência com Nitrogênio"},
                    {id: "v9p_8n_Mv_o", dur: 600, t: "Lupa Gigante de Água"}
                ]
            },
            {
                name: "Cine Action",
                videos: [
                    {id: "dQw4w9WgXcQ", dur: 212, t: "Trailer Ação 01"}
                ]
            }
        ];

        let player;
        let activeIdx = 0;

        function onYouTubeIframeAPIReady() {
            renderList();
            startTV();
        }

        function startTV() {
            const cat = CHANNELS[activeIdx];
            const video = cat.videos[Math.floor(Math.random() * cat.videos.length)];
            const startSecs = Math.floor(Date.now() / 1000) % video.dur;

            document.getElementById('video-title').innerText = video.t;

            if (!player) {
                player = new YT.Player('youtube-player', {
                    videoId: video.id,
                    playerVars: { 
                        'autoplay': 1, 'controls': 0, 'modestbranding': 1, 
                        'rel': 0, 'start': startSecs, 'origin': window.location.origin 
                    },
                    events: {
                        'onReady': (e) => { e.target.mute(); e.target.playVideo(); },
                        'onStateChange': (e) => { if(e.data === 0) startTV(); },
                        'onError': (e) => { console.log("Vídeo com erro, pulando..."); startTV(); }
                    }
                });
            } else {
                player.loadVideoById({ videoId: video.id, startSeconds: startSecs });
            }
        }

        function toggleAudio() {
            if(player.isMuted()) {
                player.unMute();
                document.getElementById('btn-audio').innerText = "Mudo";
            } else {
                player.mute();
                document.getElementById('btn-audio').innerText = "Som";
            }
        }

        function changeCh(i) {
            activeIdx = i;
            startTV();
            renderList();
        }

        function renderList() {
            const list = document.getElementById('channel-list');
            list.innerHTML = CHANNELS.map((c, i) => `
                <div onclick="changeCh(${i})" class="channel-card ${activeIdx === i ? 'active' : ''}">
                    <p class="text-[9px] text-zinc-500 font-bold mb-1 uppercase tracking-widest italic">Channel 0${i+1}</p>
                    <p class="font-black text-sm uppercase tracking-tight">${c.name}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
