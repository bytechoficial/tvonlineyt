<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web TV Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; overflow-x: hidden; }
        
        /* Container do Player para esconder bordas e logos */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Proporção 16:9 */
            background: #000;
            overflow: hidden;
        }

        /* O Iframe fica maior que o container para 'cortar' as bordas do YT se necessário */
        #youtube-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Impede cliques diretos no vídeo */
        }

        /* Camada invisível que bloqueia o mouse e o menu do YouTube */
        .player-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: rgba(0,0,0,0);
        }

        .channel-card {
            background: #111;
            border-bottom: 1px solid #222;
            transition: all 0.2s;
        }
        .channel-card.active {
            background: #1e1e1e;
            border-left: 4px solid #ffcc00;
        }
    </style>
</head>
<body class="font-sans">

    <div class="relative w-full max-w-6xl mx-auto md:mt-4 shadow-2xl">
        <div class="video-wrapper">
            <div id="youtube-player"></div>
            <div class="player-overlay"></div>
        </div>
        
        <div class="bg-zinc-900 p-4 flex justify-between items-center border-b border-zinc-800">
            <div>
                <span class="text-yellow-500 text-xs font-bold uppercase tracking-widest">No Ar Agora</span>
                <h2 id="video-title" class="text-xl font-bold leading-tight">Carregando...</h2>
            </div>
            <button onclick="toggleAudio()" id="audio-btn" class="bg-white text-black font-black py-2 px-8 rounded-sm hover:bg-yellow-400 transition transform active:scale-95">
                ATIVAR ÁUDIO
            </button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4">
        <h3 class="text-zinc-500 font-bold mb-4 uppercase text-sm">Canais Disponíveis</h3>
        <div id="guide" class="grid grid-cols-1 gap-1">
            </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const CHANNELS = [
            { id: 0, name: "Filmes 24h", videos: [{id: "dQw4w9WgXcQ", dur: 212, t: "Blockbuster Action"}] },
            { id: 1, name: "Nature Live", videos: [{id: "v_S_Xn1hY8w", dur: 500, t: "Deep Ocean Secrets"}] }
        ];

        let player;
        let activeId = 0;

        function onYouTubeIframeAPIReady() {
            renderGuide();
            syncTV();
        }

        function syncTV() {
            const channel = CHANNELS[activeId];
            const video = channel.videos[0]; // Simplificado para o exemplo
            const now = Math.floor(Date.now() / 1000);
            const startAt = now % video.dur;

            document.getElementById('video-title').innerText = video.t;

            if (!player) {
                player = new YT.Player('youtube-player', {
                    videoId: video.id,
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0, // Esconde os controles
                        'showinfo': 0,
                        'rel': 0,
                        'modestbranding': 1, // Tenta esconder o logo (limitado pelo YT)
                        'iv_load_policy': 3,
                        'start': startAt
                    },
                    events: { 'onReady': (e) => { e.target.mute(); e.target.playVideo(); } }
                });
            } else {
                player.loadVideoById({ videoId: video.id, startSeconds: startAt });
            }
        }

        function toggleAudio() {
            if(player.isMuted()) {
                player.unMute();
                document.getElementById('audio-btn').innerText = "MUTAR";
            } else {
                player.mute();
                document.getElementById('audio-btn').innerText = "ATIVAR ÁUDIO";
            }
        }

        function renderGuide() {
            const g = document.getElementById('guide');
            g.innerHTML = CHANNELS.map(c => `
                <div onclick="changeCh(${c.id})" class="channel-card p-4 cursor-pointer flex items-center ${activeId==c.id?'active':''}">
                    <div class="w-10 h-10 bg-zinc-800 mr-4 flex items-center justify-center font-bold text-yellow-500">${c.id+1}</div>
                    <div class="font-bold uppercase tracking-tighter">${c.name}</div>
                </div>
            `).join('');
        }

        function changeCh(id) { activeId = id; syncTV(); renderGuide(); }
        
        // Mantém a sincronia a cada 1 minuto
        setInterval(syncTV, 60000);
    </script>
</body>
</html>
