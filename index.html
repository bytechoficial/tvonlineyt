<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Pro - Filmes 24h</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        @media (min-width: 768px) { .app-container { flex-direction: row; } }

        .video-viewport { flex: 1; position: relative; background: #000; overflow: hidden; }
        #youtube-player {
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%;
            pointer-events: none;
        }

        .custom-player-ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 50%);
        }

        .live-progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.2); margin-bottom: 12px; }
        .live-progress-bar { height: 100%; background: #ff0000; width: 100%; }

        .control-btn { 
            display: flex; align-items: center; justify-content: center;
            padding: 8px; border-radius: 4px; transition: 0.2s; cursor: pointer;
        }
        .control-btn:hover { background: rgba(255,255,255,0.1); }
        .control-btn i { width: 20px; height: 20px; }

        .sidebar { background: #0a0a0a; border-right: 1px solid #1a1a1a; overflow-y: auto; }
        @media (min-width: 768px) { .sidebar { width: 320px; height: 100vh; } }
        @media (max-width: 767px) { .sidebar { width: 100%; height: 35vh; order: 2; } }

        .ch-item { padding: 15px 20px; border-bottom: 1px solid #111; cursor: pointer; }
        .ch-item.active { background: #111; border-left: 4px solid #e11d48; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="p-6 border-b border-zinc-800">
                <h1 class="font-black italic text-xl text-rose-600 tracking-tighter">CINE <span class="text-white">PRO</span></h1>
            </div>
            <div id="channel-list"></div>
        </aside>

        <main class="video-viewport" id="main-player">
            <div id="youtube-player"></div>

            <div class="custom-player-ui p-6" id="player-overlay">
                <div class="mb-4">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="bg-rose-600 px-1.5 py-0.5 text-[9px] font-bold uppercase rounded-sm">Filme ao Vivo</span>
                        <span id="current-time" class="text-zinc-400 text-[11px] font-mono">00:00:00</span>
                    </div>
                    <h2 id="v-title" class="text-2xl md:text-5xl font-black uppercase italic tracking-tighter">Carregando Filme...</h2>
                </div>

                <div class="live-progress-container">
                    <div class="live-progress-bar"></div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="control-btn" onclick="toggleMute()" title="Áudio">
                            <i data-lucide="volume-x" id="icon-mute"></i>
                        </div>
                        <div class="control-btn" onclick="toggleCC()" title="Legendas">
                            <i data-lucide="captions"></i>
                        </div>
                        <div class="control-btn" onclick="alert('Qualidade 4K Ativada')" title="Resolução">
                            <i data-lucide="high-quality"></i>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <div class="control-btn" onclick="toggleFav()" title="Lista">
                            <i data-lucide="plus-circle" id="icon-fav"></i>
                        </div>
                        <div class="control-btn" onclick="shareVideo()" title="Partilhar">
                            <i data-lucide="share-2"></i>
                        </div>
                        <div class="control-btn" onclick="toggleFullscreen()" title="Tela Cheia">
                            <i data-lucide="maximize"></i>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // LISTA DE FILMES (IDs DO YOUTUBE)
        const MOVIES = [
            {id: "KmqG_S8I6Yk", dur: 1200, t: "O Resgate do Soldado Ryan (Cenas)"},
            {id: "m_S4qWfH6E4", dur: 1800, t: "Interestelar - Edição Especial"},
            {id: "V8G_uV_0Dms", dur: 900, t: "Mad Max: Estrada da Fúria"},
            {id: "dQw4w9WgXcQ", dur: 212, t: "O Cavaleiro das Trevas"}
        ];

        let player;
        let isMuted = true;
        let isCC = false;
        let isFav = false;

        function onYouTubeIframeAPIReady() {
            lucide.createIcons();
            renderList();
            initTV();
            setInterval(updateClock, 1000);
        }

        function initTV() {
            const movie = MOVIES[Math.floor(Math.random() * MOVIES.length)];
            const start = Math.floor(Date.now() / 1000) % movie.dur;
            document.getElementById('v-title').innerText = movie.t;

            if (!player) {
                player = new YT.Player('youtube-player', {
                    videoId: movie.id,
                    playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'start': start, 'rel': 0 },
                    events: {
                        'onReady': (e) => { e.target.mute(); e.target.playVideo(); },
                        'onStateChange': (e) => { if(e.data === 0) initTV(); }
                    }
                });
            } else {
                player.loadVideoById({ videoId: movie.id, startSeconds: start });
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            const icon = document.getElementById('icon-mute');
            if (isMuted) {
                player.mute();
                icon.setAttribute('data-lucide', 'volume-x');
            } else {
                player.unMute();
                icon.setAttribute('data-lucide', 'volume-2');
            }
            lucide.createIcons();
        }

        function toggleCC() {
            isCC = !isCC;
            alert(isCC ? "Legendas: Português (Brasil)" : "Legendas Desativadas");
        }

        function toggleFav() {
            isFav = !isFav;
            const icon = document.getElementById('icon-fav');
            icon.style.color = isFav ? "#e11d48" : "white";
        }

        function shareVideo() {
            alert("Link do filme copiado para compartilhar!");
        }

        function toggleFullscreen() {
            const el = document.getElementById('main-player');
            if (!document.fullscreenElement) el.requestFullscreen();
            else document.exitFullscreen();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString();
        }

        function renderList() {
            const list = document.getElementById('channel-list');
            list.innerHTML = `
                <div class="ch-item active">
                    <p class="text-[10px] text-rose-500 font-bold uppercase mb-1">Canal 01</p>
                    <p class="font-bold">BLOCKBUSTER ACTION</p>
                </div>
                <div class="ch-item" onclick="alert('Canal disponível em breve')">
                    <p class="text-[10px] text-zinc-600 font-bold uppercase mb-1">Canal 02</p>
                    <p class="font-bold text-zinc-500">SCI-FI 24H</p>
                </div>
            `;
        }
    </script>
</body>
</html>
