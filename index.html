<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web TV Pro - Desktop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; overflow: hidden; height: 100-vh; }
        
        /* Layout Lateral */
        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: calc(100vh - 60px);
        }

        /* Player ocupando o resto da tela */
        .video-container {
            position: relative;
            background: #000;
            width: 100%;
            height: 100%;
        }

        #youtube-player {
            width: 100%;
            height: 100%;
            pointer-events: none; /* Bloqueia interação com YT */
        }

        .glass-shield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; background: transparent;
        }

        /* Scroll customizado para a lateral */
        .sidebar {
            background: #111;
            overflow-y: auto;
            border-right: 1px solid #222;
        }

        .channel-item {
            padding: 20px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: 0.3s;
        }

        .channel-item:hover { background: #222; }
        .channel-item.active {
            background: #1a1a1a;
            border-left: 5px solid #facc15;
        }

        /* Barra de progresso 100% Live */
        .live-indicator {
            height: 3px;
            background: #ff0000;
            width: 100%;
        }
    </style>
</head>
<body>

    <header class="h-[60px] bg-black border-b border-zinc-800 flex items-center justify-between px-6">
        <h1 class="text-xl font-black tracking-tighter text-yellow-500 italic">WEB TV <span class="text-white text-xs">LIVE</span></h1>
        <button onclick="toggleMute()" id="mute-btn" class="bg-white text-black px-6 py-1 rounded font-bold text-sm">ATIVAR ÁUDIO</button>
    </header>

    <div class="main-layout">
        <aside class="sidebar" id="channel-list">
            </aside>

        <section class="flex flex-col">
            <div class="video-container">
                <div id="youtube-player"></div>
                <div class="glass-shield"></div>
            </div>
            
            <div class="live-indicator"></div>

            <div class="p-6 bg-zinc-900 border-t border-zinc-800 flex justify-between">
                <div>
                    <p class="text-red-600 text-[10px] font-bold uppercase tracking-widest mb-1">● Programação ao vivo</p>
                    <h2 id="video-title" class="text-2xl font-bold italic">Carregando...</h2>
                </div>
            </div>
        </section>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const CHANNELS = [
            {
                name: "AÇÃO 24H",
                videos: [
                    {id: "dQw4w9WgXcQ", dur: 212, t: "Missão Secreta"},
                    {id: "3tmd-ClpJKA", dur: 180, t: "Perseguição em Alta Velocidade"}
                ]
            },
            {
                name: "DOCUMENTÁRIOS",
                videos: [
                    {id: "v_S_Xn1hY8w", dur: 500, t: "Oceano Profundo"},
                    {id: "7664478", dur: 3600, t: "Cosmos HD"}
                ]
            },
            {
                name: "RETRO TV",
                videos: [
                    {id: "9bZkp7q19f0", dur: 240, t: "Clássicos dos Anos 80"}
                ]
            }
        ];

        let player;
        let activeIndex = 0;

        function onYouTubeIframeAPIReady() {
            renderSidebar();
            loadTV();
        }

        function loadTV() {
            const cat = CHANNELS[activeIndex];
            // Sorteia um vídeo da categoria
            const video = cat.videos[Math.floor(Math.random() * cat.videos.length)];
            const startAt = Math.floor(Date.now() / 1000) % video.dur;

            document.getElementById('video-title').innerText = video.t;

            if (!player) {
                player = new YT.Player('youtube-player', {
                    videoId: video.id,
                    playerVars: {
                        'autoplay': 1, 'controls': 0, 'modestbranding': 1,
                        'rel': 0, 'start': startAt, 'disablekb': 1
                    },
                    events: {
                        'onReady': (e) => { e.target.mute(); e.target.playVideo(); },
                        'onStateChange': (e) => { if(e.data === 0) loadTV(); } // Troca quando acaba
                    }
                });
            } else {
                player.loadVideoById({ videoId: video.id, startSeconds: startAt });
            }
        }

        function toggleMute() {
            if(player.isMuted()) {
                player.unMute();
                document.getElementById('mute-btn').innerText = "MUTAR";
            } else {
                player.mute();
                document.getElementById('mute-btn').innerText = "ATIVAR ÁUDIO";
            }
        }

        function changeChannel(index) {
            activeIndex = index;
            loadTV();
            renderSidebar();
        }

        function renderSidebar() {
            const list = document.getElementById('channel-list');
            list.innerHTML = CHANNELS.map((ch, i) => `
                <div onclick="changeChannel(${i})" class="channel-item ${activeIndex === i ? 'active' : ''}">
                    <p class="text-[10px] text-zinc-500 font-bold mb-1 italic">CANAL 0${i+1}</p>
                    <p class="font-black text-sm uppercase tracking-tight">${ch.name}</p>
                    <p class="text-[11px] text-yellow-500 mt-2">● NO AR AGORA</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
